  - "[laughs]"      # short warm laugh
  - "you know"      # verbal tic
  - "I mean"        # verbal tic

replacement_phrasings:
  "the economy": "'the economy,' quote unquote"
  "obviously": "well — [pauses] — obviously, right?"

sources:
